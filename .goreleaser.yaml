version: 2

project_name: jobmcp

builds:
  - main: ./cmd/jobmcp
    binary: jobmcp
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats: [zip]

dockers_v2:
  - images:
      - ghcr.io/amikai/job-mcp
    tags:
      - '{{ .Version }}'
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: '{{ .ProjectName }}'
      org.opencontainers.image.description: 'MCP server for searching job listings across job boards and company career sites'
      org.opencontainers.image.source: 'https://github.com/amikai/job-mcp'
      org.opencontainers.image.version: '{{ .Version }}'
      org.opencontainers.image.licenses: MIT

release:
  footer: |
    ## Docker image

    Multi-arch image (linux/amd64, linux/arm64):

    ```
    docker pull ghcr.io/amikai/job-mcp:{{ .Version }}
    ```

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs'
      - '^test'
      - '^chore'
